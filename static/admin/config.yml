backend:
  name: github
  repo: suthervitch-recipes/suthervitch-recipes.github.io
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "recipes"
    label: "Recipes"
    folder: "content/recipes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      
      # Optional metadata
      - { label: "Publish Date", name: "date", widget: "datetime", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      
      # Recipe Stats & Rating
      - { label: "Rating (Stars)", name: "stars", widget: "select", options: ["1", "2", "3", "4", "5"], required: false }
      - { label: "Portions", name: "portions", widget: "string", required: false, hint: "e.g., 4 people" }
      - { label: "Prep Time", name: "prepTime", widget: "string", required: false, hint: "e.g., 15 mins" }
      - { label: "Cook Time", name: "cookTime", widget: "string", required: false, hint: "e.g., 45 mins" }

      - label: "Featured Image"
        name: "cover"
        widget: "object"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image", required: false, default: "" }
          - { label: "Alt Text", name: "alt", widget: "string", required: false }
          - { label: "Caption", name: "caption", widget: "string", required: false }

      - { label: "Ingredients", name: "ingredients", widget: "list", summary: "{{fields.item}}" }
      
      - { label: "Instructions", name: "body", widget: "markdown" }

      - label: "Personal Notes"
        name: "notes"
        widget: "markdown"
        required: false
        hint: "Your private tips, variations, or comments about this dish"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        # Clean UI: One text line per tag, no nested boxes
        field: { label: "Tag", widget: "string" }
